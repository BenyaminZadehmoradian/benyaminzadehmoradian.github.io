<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – Benyamin Zadehmoradian</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(-45deg, #fdf1d6, #ffe0e0, #ebe7ff, #d8f5e3);
      background-size: 300% 300%;
      animation: bg 20s ease-in-out infinite;
      padding: 2rem;
      text-align: center;
    }
    @keyframes bg {
      0%, 100% { background-position: 0% 50%; }
      50%       { background-position: 100% 50%; }
    }
    .card {
      background: white;
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      max-width: 420px;
      width: 100%;
    }
    .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(90deg, #6366f1, #db2777);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.75rem;
    }
    p { color: #6b7280; line-height: 1.6; margin-bottom: 1.5rem; }
    a {
      display: inline-block;
      padding: 0.6rem 1.5rem;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you don't have an internet connection right now. Please check your network and try again.</p>
    <a href="/" onclick="location.reload()">Try Again</a>
  </div>
</body>
</html>
